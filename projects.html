<!DOCTYPE html>
<html>
    <head>
        <title>Middleclicker's Website | Projects</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/common.css" type="text/css">
        <link rel="stylesheet" href="css/projects.css" type="text/css">
    </head>
    <body>
        <div class="navbar">
            <img src="Assets/Navbar/Logo.png" style="position: absolute; height: 30px; padding-top:8px; padding-left: 20px">
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
            <a class="active"href="/projects.html">Projects</a>
            <a href="/index.html">Home</a>
        </div>

        <div class="header">
            <div class="text-wrapper">
                <h1 id="typewriter"></h1>
            </div>

            <a href="#viewprojects" id="viewprojectsbtn">View projects</a>

            <div id="particles-js"></div>
        </div>

        <div class="footer">
            <div class="footer-logo"></div>
            <p class="footer-text">Copyright © 2021 by Middleclicker. All Rights Reserved.</p>
        </div>

        <!-- Javascript -->
        <!-- TypeIt -->
        <script src="https://unpkg.com/typeit@8.0.2/dist/index.umd.js"></script>
        <script>
            new TypeIt("#typewriter", {
                speed: 50,
                waitUntilVisible: true,
            })
                .exec(async () => {
                    await new Promise((resolve, reject) => {
                        setTimeout(() => {
                            return resolve();
                        }, 2000);
                    });
                })
                .type("This is where I keep all my projects.")
                .go();
        </script>

        <!-- Button timeout -->
        <script>
            
            document.getElementById("viewprojectsbtn").style.display = "none";
            function showBtn() {
                document.getElementById("viewprojectsbtn").style.display = "inline";
            }
            function myFunction() {
                window.location = "projects.html"
            }
            setTimeout(showBtn, 5000);
            
        </script>

        <!-- Particles Js -->
        <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
        <script>
            particlesJS.load('particles-js', '/particleConfigs/Bubble.json', function(){
                console.log('particles.json loaded...');
            });
        </script>
    </body>
</html>
